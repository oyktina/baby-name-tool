<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>이름 상세</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Noto Sans KR",
          sans-serif;
        margin: 24px;
        max-width: 720px;
      }
      .title {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .muted {
        color: #666;
        font-size: 13px;
      }
      .card {
        border: 1px solid #eee;
        border-radius: 12px;
        padding: 12px 14px;
        margin: 10px 0;
      }
      .pill {
        display: inline-block;
        border: 1px solid #ddd;
        border-radius: 999px;
        padding: 6px 10px;
        margin-right: 6px;
        margin-top: 6px;
        font-size: 12px;
      }
      a {
        color: inherit;
      }
      .btn {
        display: inline-block;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        text-decoration: none;
        margin-right: 8px;
      }
      hr {
        margin: 18px 0;
        border: 0;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="title" id="nameTitle">이름 상세</div>
    <div class="muted" id="subTitle"></div>

    <hr />

    <div class="card" id="summaryCard">불러오는 중...</div>

    <div class="card">
      <div style="font-weight: 700; margin-bottom: 6px">느낌(추정)</div>
      <div id="tagPills" class="muted">-</div>
    </div>

    <div class="card">
      <div style="font-weight: 700; margin-bottom: 6px">공유</div>
      <div class="muted" id="shareText"></div>
    </div>

    <hr />

    <a class="btn" href="../index.html">← 다시 추천받기</a>
    <a class="btn" id="copyLink" href="#">링크 복사</a>

    <script type="module" src="../src/name-page.js"></script>
  </body>
</html>
