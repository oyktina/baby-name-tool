형제자매 이름은 서로 어울리는 조합을 고려하는 경우가 많습니다.
비슷한 분위기의 이름을 선택하면 가족 이름의 조화가 자연스럽게 느껴집니다.
</p>

<h2>비슷한 분위기 유지하기</h2>

</p>

<h2>예시 조합</h2>
<ul>
<li>서윤 – 서준</li>
<li>하윤 – 하준</li>
<li>지안 – 지우</li>
</ul>
